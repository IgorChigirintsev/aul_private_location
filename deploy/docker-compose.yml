# Aul self-host stack. Copy .env.example to .env and fill in the secrets first:
#   cp deploy/.env.example deploy/.env && $EDITOR deploy/.env
#   docker compose -f deploy/docker-compose.yml up -d
#
# Profiles:
#   (default)     server + postgres
#   --profile tls    also run Caddy for automatic HTTPS (edit deploy/caddy/Caddyfile)
#   --profile tiles  also run a self-hosted MapLibre tile server (drop a .pmtiles in deploy/tiles/)

name: aul

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aul}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-aul}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aul} -d ${POSTGRES_DB:-aul}"]
      interval: 5s
      timeout: 3s
      retries: 20
    # Not published to the host by default — only the server reaches it.
    expose:
      - "5432"

  server:
    build:
      context: ../server
      dockerfile: Dockerfile
    image: aul-server:local
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      AUL_ENV: production
      HTTP_ADDR: ":8080"
      PUBLIC_ORIGIN: ${PUBLIC_ORIGIN:?set PUBLIC_ORIGIN in .env}
      DATABASE_URL: postgres://${POSTGRES_USER:-aul}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-aul}?sslmode=disable
      SESSION_HASH_PEPPER: ${SESSION_HASH_PEPPER:?set SESSION_HASH_PEPPER in .env}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      TRUSTED_SERVER_MODE: ${TRUSTED_SERVER_MODE:-false}
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-true}
      IP_LOG_RETENTION_DAYS: ${IP_LOG_RETENTION_DAYS:-7}
      # Sealed pings are kept this many hours (1..168); each device's newest ping
      # always survives regardless of age, so nobody blanks off the map.
      PING_RETENTION_HOURS: ${PING_RETENTION_HOURS:-6}
      DEFAULT_RETENTION_DAYS: ${DEFAULT_RETENTION_DAYS:-7}
      MAX_RETENTION_DAYS: ${MAX_RETENTION_DAYS:-90}
      TILES_ORIGIN: ${TILES_ORIGIN:-https://tiles.openfreemap.org}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      RETENTION_FEATURES_ENABLED: ${RETENTION_FEATURES_ENABLED:-true}
      # Web Push (VAPID) — the browser channel. Empty = disabled (server boots).
      # Generate with: docker compose run --rm server aul vapid-keys
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
      # FCM — the Android channel. Empty = disabled (server boots, Web Push
      # unaffected). Path INSIDE the container: drop the service-account JSON at
      # deploy/fcm/service-account.json on the host and set this to
      # /fcm/service-account.json. The two channels are independent; either
      # alone, both, or neither all work.
      FCM_SERVICE_ACCOUNT_FILE: ${FCM_SERVICE_ACCOUNT_FILE:-}
      APK_DIR: ${APK_DIR:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    # Publish directly for a no-TLS trial; put a reverse proxy in front for prod.
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./apk:/apk:ro
      # The Firebase service-account key. Read-only, and it stays a file rather
      # than an env var so the private key is never in `docker inspect` or a
      # process listing. The directory is created empty if you do not use FCM.
      - ./fcm:/fcm:ro

  caddy:
    image: caddy:2
    profiles: ["tls"]
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"
      - "443:443"
    environment:
      AUL_DOMAIN: ${AUL_DOMAIN:?set AUL_DOMAIN in .env for TLS}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config

  # Optional self-hosted map tiles. Drop an OpenFreeMap/Protomaps .pmtiles file
  # into deploy/tiles/ and set TILES_ORIGIN accordingly. nginx serves range
  # requests (required by pmtiles) and adds permissive CORS for the web app.
  tiles:
    image: nginx:1.27-alpine
    profiles: ["tiles"]
    restart: unless-stopped
    volumes:
      - ./tiles:/usr/share/nginx/html:ro
      - ./tiles/nginx-cors.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${TILES_PORT:-8082}:80"
