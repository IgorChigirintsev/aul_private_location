# Serves a .pmtiles file with HTTP range support (required by pmtiles) and CORS
# for the Aul web app. Place your OpenFreeMap/Protomaps export at
# deploy/tiles/<name>.pmtiles and point the web style at it.
server {
    listen 80;
    root /usr/share/nginx/html;

    location / {
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        if ($request_method = OPTIONS) { return 204; }
        # nginx serves Range requests for static files by default.
        types { application/octet-stream pmtiles; }
        autoindex off;
    }
}
